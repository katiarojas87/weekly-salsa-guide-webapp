services:
  - type: web
    name: weekly-salsa-guide-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps chromium"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.9"
    disk:
      name: salsa-data
      mountPath: /data
      sizeGB: 1
